<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>記憶對決：與秦徹的博弈</title>
    <style>
        :root {
            --bg-color: #050508;
            --card-back: #121218;
            --p1-color: #54a0ff;
            --qin-color: #ff4d4d;
            --accent: #ffd32a;
            --text: #ffffff;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text); font-family: "Microsoft JhengHei", sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .main-container { display: flex; flex-direction: row; gap: 30px; align-items: center; width: 95%; max-width: 1000px; padding: 10px; }
        
        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            .qin-section { width: 100% !important; flex-direction: row !important; height: 120px; }
            .qin-portrait-frame { width: 80px !important; height: 120px !important; }
            .grid { grid-template-columns: repeat(4, 75px) !important; grid-template-rows: repeat(3, 100px) !important; gap: 8px !important; }
        }

        .qin-section { width: 280px; display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
        .qin-portrait-frame { width: 260px; height: 380px; background: linear-gradient(180deg, transparent, rgba(255, 77, 77, 0.1)); border-bottom: 3px solid var(--qin-color); overflow: hidden; display: flex; justify-content: center; align-items: flex-end; }
        .qin-image { width: 100%; height: 100%; object-fit: contain; transition: opacity 0.4s; }
        .qin-dialogue { margin-top: 10px; background: rgba(255, 255, 255, 0.03); border-left: 4px solid var(--qin-color); padding: 12px; width: 100%; min-height: 50px; font-size: 0.9rem; position: relative; }
        .qin-name-tag { position: absolute; top: -10px; left: 10px; background: var(--qin-color); padding: 1px 6px; font-size: 0.65rem; }

        .game-section { flex: 1; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .status-bar { width: 100%; max-width: 400px; display: flex; justify-content: space-between; margin-bottom: 15px; }
        .player-badge { font-size: 0.8rem; padding: 5px 10px; opacity: 0.2; }
        .player-badge.active { opacity: 1; background: rgba(255,255,255,0.1); outline: 1px solid white; }
        .target-card { background: #000; border: 2px solid var(--accent); padding: 8px; border-radius: 8px; text-align: center; }

        .grid { display: grid; grid-template-columns: repeat(4, 85px); grid-template-rows: repeat(3, 115px); gap: 12px; perspective: 1000px; }
        .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .card.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
        .card-back { background: var(--card-back); border: 1px solid #333; color: #222; }
        .card-front { background: #fff; transform: rotateY(180deg); }
        .card-front img { width: 80%; height: 80%; object-fit: contain; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .modal-window { background: #111; padding: 30px; border-top: 4px solid var(--qin-color); text-align: center; width: 100%; max-width: 400px; }
        .action-btn { background: var(--qin-color); color: white; border: none; padding: 12px; cursor: pointer; font-weight: bold; width: 100%; text-decoration: none; display: inline-block; margin-top: 10px; }
        .gallery-btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); margin-bottom: 5px; }
        .hidden { display: none !important; }
        .name-input { width: 100%; padding: 12px; margin: 15px 0; background: #222; border: 1px solid #444; color: white; text-align: center; }
    </style>
</head>
<body>

    <div id="setup-screen" class="modal-overlay">
        <div class="modal-window">
            <h2 style="color: var(--accent);">記憶對決</h2>
            <p style="color: #888; font-size: 0.8rem;">對手：秦徹</p>
            <input type="text" id="player-name-input" class="name-input" placeholder="輸入稱號" maxlength="8">
            <button class="action-btn" onclick="initGame()">進入戰局</button>
        </div>
    </div>

    <div id="end-screen" class="modal-overlay hidden">
        <div class="modal-window">
            <h2 id="end-title"></h2>
            <p id="end-desc" style="text-align: left; font-size: 0.9rem; color: #ccc; margin: 15px 0;"></p>
            <!-- 動態相簿連結 -->
            <a id="album-link" href="#" class="action-btn gallery-btn">查看專屬相簿</a>
            <button class="action-btn" onclick="location.reload()" style="background: #333;">重新開始</button>
        </div>
    </div>

    <div class="main-container">
        <div class="qin-section">
            <div class="qin-portrait-frame"><img id="qin-img" class="qin-image" src=""></div>
            <div class="qin-dialogue"><div class="qin-name-tag">秦徹</div><span id="qin-text">...</span></div>
        </div>
        <div class="game-section">
            <div class="status-bar">
                <div id="p1-badge" class="player-badge active" style="color: var(--p1-color);">玩家</div>
                <div class="target-card">
                    <img id="target-icon" src="" style="width: 30px; height: 30px; object-fit: contain;">
                    <div style="font-size: 0.6rem; color: var(--accent); margin-top: 3px;"><span id="target-name"></span></div>
                </div>
                <div id="qin-badge" class="player-badge" style="color: var(--qin-color);">秦徹</div>
            </div>
            <div class="grid" id="grid"></div>
        </div>
    </div>

    <script>
        const QIN_ASSETS = {
            "normal": { img: "https://via.placeholder.com/300x450?text=Qin_Normal", msg: "該你了，別讓我等太久。" },
            "thinking": { img: "https://via.placeholder.com/300x450?text=Qin_Thinking", msg: "讓我看看，你的運氣如何？" },
            "win": { img: "https://via.placeholder.com/300x450?text=Qin_Win", msg: "勝負已分。你還不夠成熟。" },
            "lose": { img: "https://via.placeholder.com/300x450?text=Qin_Lose", msg: "不錯，這份驚喜我收下了。" }
        };

        const CARDS_CONFIG = { "薛明": "https://cdn-icons-png.flaticon.com/128/4333/4333609.png", "槍": "https://cdn-icons-png.flaticon.com/128/5457/5457494.png", "寶石": "https://cdn-icons-png.flaticon.com/128/1255/1255153.png", "羽毛": "https://cdn-icons-png.flaticon.com/128/2913/2913501.png", "梅": "https://cdn-icons-png.flaticon.com/128/1047/1047461.png", "薛影": "https://cdn-icons-png.flaticon.com/128/4333/4333614.png" };

        let cardList = [...Object.keys(CARDS_CONFIG), ...Object.keys(CARDS_CONFIG)];
        let target = "";
        let playerName = "探測者";
        let currentPlayer = 1; 
        let flippedStack = [];
        let isLocked = true;
        let memory = {};

        async function initGame() {
            const nameInput = document.getElementById('player-name-input');
            if(nameInput.value.trim()) playerName = nameInput.value.trim();
            document.getElementById('p1-badge').innerText = playerName;
            document.getElementById('setup-screen').classList.add('hidden');
            setupBoard();
            setQinState("normal");
            isLocked = false;
        }

        function setQinState(stateKey) {
            const data = QIN_ASSETS[stateKey];
            const img = document.getElementById('qin-img');
            img.style.opacity = 0;
            setTimeout(() => { img.src = data.img; document.getElementById('qin-text').innerText = data.msg; img.style.opacity = 1; }, 200);
        }

        function setupBoard() {
            target = Object.keys(CARDS_CONFIG)[Math.floor(Math.random() * 6)];
            document.getElementById('target-name').innerText = target;
            document.getElementById('target-icon').src = CARDS_CONFIG[target];
            cardList.sort(() => Math.random() - 0.5);
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            cardList.forEach((type, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.type = type;
                card.dataset.index = i;
                card.innerHTML = `<div class="card-face card-back">?</div><div class="card-face card-front"><img src="${CARDS_CONFIG[type]}"></div>`;
                card.addEventListener('click', () => { if(!isLocked && currentPlayer === 1 && !card.classList.contains('flipped')) handleFlip(card); });
                grid.appendChild(card);
            });
        }

        function handleFlip(card) {
            card.classList.add('flipped');
            flippedStack.push(card);
            memory[card.dataset.index] = card.dataset.type;
            if (flippedStack.length === 2) { isLocked = true; setTimeout(checkResult, 600); }
        }

        function checkResult() {
            const [c1, c2] = flippedStack;
            if (c1.dataset.type === c2.dataset.type) {
                if (c1.dataset.type === target) { showEnd(currentPlayer); return; }
                switchTurn();
            } else {
                setTimeout(() => { c1.classList.remove('flipped'); c2.classList.remove('flipped'); switchTurn(); }, 400);
            }
        }

        function switchTurn() {
            flippedStack = [];
            currentPlayer = (currentPlayer === 1) ? 2 : 1;
            document.getElementById('p1-badge').classList.toggle('active', currentPlayer === 1);
            document.getElementById('qin-badge').classList.toggle('active', currentPlayer === 2);
            if (currentPlayer === 2) { setQinState("thinking"); setTimeout(qinAI, 1000); }
            else { isLocked = false; setQinState("normal"); }
        }

        function qinAI() {
            const cards = document.querySelectorAll('.card');
            const hiddenIdx = [...cards].filter(c => !c.classList.contains('flipped')).map(c => parseInt(c.dataset.index));
            if (hiddenIdx.length === 0) return;
            const targetInMem = Object.keys(memory).filter(idx => memory[idx] === target && hiddenIdx.includes(parseInt(idx)));
            let p1, p2;
            if (targetInMem.length >= 2) { p1 = targetInMem[0]; p2 = targetInMem[1]; } 
            else {
                p1 = hiddenIdx[Math.floor(Math.random() * hiddenIdx.length)];
                handleFlip(cards[p1]);
                setTimeout(() => {
                    const match = Object.keys(memory).find(idx => memory[idx] === cards[p1].dataset.type && idx != p1 && hiddenIdx.includes(parseInt(idx)));
                    p2 = match || hiddenIdx.filter(i => i != p1)[Math.floor(Math.random() * (hiddenIdx.length - 1))];
                    handleFlip(cards[p2]);
                }, 600);
                return;
            }
            handleFlip(cards[p1]); setTimeout(() => handleFlip(cards[p2]), 600);
        }

        function showEnd(winner) {
            document.getElementById('end-screen').classList.remove('hidden');
            const linkBtn = document.getElementById('album-link');
            if (winner === 1) {
                setQinState("lose");
                document.getElementById('end-title').innerText = "結局 A：贏得博弈";
                document.getElementById('end-desc').innerText = `秦徹看著你：「不錯的實力。既然你贏了，這份『回憶錄』就歸你了。」`;
                linkBtn.href = "win_album.html";
            } else {
                setQinState("win");
                document.getElementById('end-title').innerText = "結局 B：掌控之中";
                document.getElementById('end-desc').innerText = `秦徹翻開最後一對牌：「太慢了。雖然你輸了，但如果你肯開口，我也不是不能分你一些東西...」`;
                linkBtn.href = "lose_album.html";
            }
        }
    </script>
</body>
</html>
