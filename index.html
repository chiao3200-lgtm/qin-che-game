<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記憶對戰：與秦徹的博弈</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --card-back: #1c1c21;
            --p1-color: #70a1ff;
            --qin-color: #ff4757; /* 秦徹代表色：緋紅與黑 */
            --accent: #eccc68;
            --text: #f1f2f6;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 開場畫面 */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: #151518;
            padding: 40px;
            border-radius: 5px; /* 稜角分明更顯冷峻 */
            border-left: 5px solid var(--qin-color);
            text-align: center;
            max-width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .name-input {
            width: 80%;
            padding: 12px;
            margin: 20px 0;
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
            text-align: center;
            font-size: 1rem;
        }

        .btn-main {
            background: var(--qin-color);
            color: white;
            border: none;
            padding: 12px 40px;
            letter-spacing: 2px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-main:hover { background: #ff6b81; transform: translateY(-2px); }

        /* 遊戲介面 */
        .game-header { width: 100%; max-width: 450px; margin-bottom: 25px; }
        .status-bar { display: flex; justify-content: space-between; align-items: center; }
        
        .player-badge {
            padding: 10px 20px;
            font-size: 0.9rem;
            opacity: 0.3;
            transition: 0.4s;
            border-bottom: 3px solid transparent;
        }
        .player-badge.active { opacity: 1; border-bottom-color: currentColor; }
        .p1 { color: var(--p1-color); }
        .qin { color: var(--qin-color); }

        .target-box {
            background: #151518;
            padding: 10px;
            border: 1px solid var(--accent);
            text-align: center;
            border-radius: 4px;
        }
        .target-icon { width: 45px; height: 45px; object-fit: contain; filter: drop-shadow(0 0 5px var(--accent)); }
        #target-label { font-size: 0.7rem; color: var(--accent); display: block; margin-top: 5px; }

        /* 卡牌網格 */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 85px);
            grid-template-rows: repeat(3, 115px);
            gap: 15px;
            perspective: 1000px;
        }

        .card {
            width: 100%; height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
        }
        .card.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-back {
            background-color: var(--card-back);
            border: 1px solid #333;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .card-back::after { content: "N2"; color: #333; font-size: 0.8rem; }

        .card-front {
            background-color: #fff;
            transform: rotateY(180deg);
        }
        .card-front img { width: 80%; height: 80%; object-fit: contain; }

        .hint-text { margin-top: 25px; font-size: 0.85rem; color: #666; letter-spacing: 1px; }
        .hidden { display: none !important; }

        #end-desc { line-height: 1.8; text-align: left; margin: 20px 0; font-size: 0.95rem; }
    </style>
</head>
<body>

    <!-- 開場畫面 -->
    <div id="start-screen" class="modal">
        <div class="modal-content">
            <h2 style="letter-spacing: 4px;">暗網博弈</h2>
            <p style="color: #888; font-size: 0.9rem;">秦 徹</p>
            <input type="text" id="user-name-input" class="name-input" placeholder="輸入你的稱呼" maxlength="10">
            <button class="btn-main" onclick="startGame()">開始對峙</button>
        </div>
    </div>

    <!-- 結局視窗 -->
    <div id="end-modal" class="modal hidden">
        <div class="modal-content" style="max-width: 400px;">
            <h2 id="end-title">結局</h2>
            <p id="end-desc"></p>
            <button class="btn-main" onclick="location.reload()">再次博弈</button>
        </div>
    </div>

    <!-- 遊戲介面 -->
    <div class="game-header">
        <div class="status-bar">
            <div id="p1-badge" class="player-badge p1 active">玩家</div>
            <div class="target-box">
                <img id="target-img" class="target-icon" src="" alt="">
                <span id="target-label">---</span>
            </div>
            <div id="qin-badge" class="player-badge qin">秦徹</div>
        </div>
    </div>

    <div class="grid" id="grid"></div>
    <div class="hint-text" id="msg">...</div>

    <script>
        const itemConfig = {
            "薛明": "https://cdn-icons-png.flaticon.com/128/4333/4333609.png", 
            "薛影": "https://cdn-icons-png.flaticon.com/128/4333/4333614.png",
            "梅":   "https://cdn-icons-png.flaticon.com/128/1047/1047461.png",
            "槍":   "https://cdn-icons-png.flaticon.com/128/5457/5457494.png",
            "寶石": "https://cdn-icons-png.flaticon.com/128/1255/1255153.png",
            "羽毛": "https://cdn-icons-png.flaticon.com/128/2913/2913501.png"
        };

        const itemNames = Object.keys(itemConfig);
        let cardsArray = [...itemNames, ...itemNames];
        let targetItem = "";
        let currentPlayer = 1;
        let playerName = "探測者";
        let flippedCards = [];
        let isLock = true;
        let aiMemory = {};

        function startGame() {
            const inputName = document.getElementById('user-name-input').value.trim();
            if (inputName) playerName = inputName;
            document.getElementById('p1-badge').innerText = playerName;
            document.getElementById('start-screen').classList.add('hidden');
            isLock = false;
            initBoard();
        }

        function initBoard() {
            cardsArray.sort(() => Math.random() - 0.5);
            targetItem = itemNames[Math.floor(Math.random() * itemNames.length)];
            
            document.getElementById('target-label').innerText = `目標：${targetItem}`;
            document.getElementById('target-img').src = itemConfig[targetItem];
            document.getElementById('msg').innerText = `${playerName}，輪到你了。`;

            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            cardsArray.forEach((name, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.name = name;
                card.dataset.index = index;
                card.innerHTML = `
                    <div class="card-face card-back"></div>
                    <div class="card-face card-front">
                        <img src="${itemConfig[name]}" alt="${name}">
                    </div>
                `;
                card.addEventListener('click', () => {
                    if (currentPlayer === 1 && !isLock && !card.classList.contains('flipped')) {
                        handleFlip(card);
                    }
                });
                grid.appendChild(card);
            });
        }

        function handleFlip(card) {
            card.classList.add('flipped');
            flippedCards.push(card);
            aiMemory[card.dataset.index] = card.dataset.name;

            if (flippedCards.length === 2) {
                checkMatch();
            }
        }

        function checkMatch() {
            isLock = true;
            const [c1, c2] = flippedCards;
            const isMatch = c1.dataset.name === c2.dataset.name;

            if (isMatch) {
                if (c1.dataset.name === targetItem) {
                    setTimeout(() => showEnding(currentPlayer), 600);
                } else {
                    document.getElementById('msg').innerText = `秦徹盯著那對「${c1.dataset.name}」，發出一聲輕笑。`;
                    setTimeout(switchTurn, 1000);
                }
            } else {
                setTimeout(() => {
                    c1.classList.remove('flipped');
                    c2.classList.remove('flipped');
                    switchTurn();
                }, 1000);
            }
        }

        function switchTurn() {
            flippedCards = [];
            currentPlayer = (currentPlayer === 1) ? 2 : 1;
            isLock = (currentPlayer === 2);

            document.getElementById('p1-badge').classList.toggle('active', currentPlayer === 1);
            document.getElementById('qin-badge').classList.toggle('active', currentPlayer === 2);

            if (currentPlayer === 2) {
                document.getElementById('msg').innerText = `秦徹正在觀察局勢...`;
                setTimeout(aiMove, 1200);
            } else {
                document.getElementById('msg').innerText = `別讓秦徹看穿你的意圖，${playerName}。`;
            }
        }

        function aiMove() {
            const allCards = [...document.querySelectorAll('.card')];
            const availableIndexes = allCards
                .filter(c => !c.classList.contains('flipped'))
                .map(c => parseInt(c.dataset.index));

            if (availableIndexes.length === 0) return;

            const targetsInMem = Object.keys(aiMemory).filter(idx => 
                aiMemory[idx] === targetItem && availableIndexes.includes(parseInt(idx))
            );

            let pick1Idx, pick2Idx;

            if (targetsInMem.length >= 2) {
                pick1Idx = targetsInMem[0];
                pick2Idx = targetsInMem[1];
            } else {
                pick1Idx = availableIndexes[Math.floor(Math.random() * availableIndexes.length)];
                const pick1 = allCards[pick1Idx];
                pick1.classList.add('flipped');
                flippedCards.push(pick1);
                aiMemory[pick1Idx] = pick1.dataset.name;

                setTimeout(() => {
                    const matchIdx = Object.keys(aiMemory).find(idx => 
                        aiMemory[idx] === pick1.dataset.name && 
                        idx != pick1Idx && 
                        availableIndexes.includes(parseInt(idx))
                    );
                    pick2Idx = matchIdx || availableIndexes.filter(i => i != pick1Idx)[Math.floor(Math.random() * (availableIndexes.length - 1))];
                    handleFlip(allCards[pick2Idx]);
                }, 800);
                return;
            }

            handleFlip(allCards[pick1Idx]);
            setTimeout(() => handleFlip(allCards[pick2Idx]), 800);
        }

        function showEnding(winner) {
            const modal = document.getElementById('end-modal');
            const title = document.getElementById('end-title');
            const desc = document.getElementById('end-desc');
            modal.classList.remove('hidden');

            if (winner === 1) {
                title.innerText = "結局 A：贏得的籌碼";
                title.style.color = "var(--p1-color)";
                desc.innerText = `在緊張的博弈中，${playerName} 搶先翻開了最後一對「${targetItem}」。\n\n秦徹交疊雙腿，修長的指尖在桌面上輕點。他並不顯得懊惱，反而饒有興致地看著你：「不錯的記憶力，這份『獎勵』暫時歸你了。不過...博弈還長著呢。」`;
            } else {
                title.innerText = "結局 B：掌控之中";
                title.style.color = "var(--qin-color)";
                desc.innerText = `秦徹不疾不徐地翻開了兩張「${targetItem}」，動作優雅得像是在進行一場獵殺。\n\n「太慢了，${playerName}。」他低沉的聲音在耳邊響起，帶著一絲危險的調侃，「這件東西我就收下了。至於你，還需要更多的練習...或者，直接求我也可以。」`;
            }
        }
    </script>
</body>
</html>
