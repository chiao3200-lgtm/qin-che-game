<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記憶對戰：秦徹的戰利品</title>
    <style>
        :root {
            --bg-color: #08080a;
            --card-back: #15151b;
            --p1-color: #54a0ff;
            --qin-color: #ff4d4d;
            --accent: #ffd32a;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: "Microsoft JhengHei", sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .main-container {
            display: flex;
            gap: 50px;
            align-items: center;
            max-width: 1100px;
            padding: 20px;
        }

        /* --- 左側：秦徹區域 --- */
        .qin-sidebar {
            width: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .qin-portrait-frame {
            width: 320px;
            height: 480px;
            background: linear-gradient(to bottom, transparent, rgba(255, 77, 77, 0.15));
            border-bottom: 4px solid var(--qin-color);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .qin-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: 0.4s ease;
        }

        .qin-dialogue-box {
            margin-top: 20px;
            background: rgba(20, 20, 25, 0.8);
            border-left: 4px solid var(--qin-color);
            padding: 15px;
            width: 100%;
            min-height: 60px;
            font-size: 1rem;
            color: #ececec;
            position: relative;
        }

        .qin-name-tag {
            position: absolute;
            top: -12px; left: 10px;
            background: var(--qin-color);
            padding: 2px 10px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        /* --- 右側：遊戲區域 --- */
        .game-board-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .top-info {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .player-tag {
            padding: 10px 20px;
            font-weight: bold;
            opacity: 0.2;
            transition: 0.4s;
            border: 1px solid transparent;
        }
        .player-tag.active { opacity: 1; border-color: var(--text); background: rgba(255,255,255,0.05); }

        .target-card {
            background: #111;
            border: 2px solid var(--accent);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 0 15px rgba(255, 211, 42, 0.2);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 90px);
            grid-template-rows: repeat(3, 120px);
            gap: 15px;
        }

        /* --- 卡牌本體 --- */
        .card {
            width: 100%; height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .card.flipped { transform: rotateY(180deg); cursor: default; }

        .card-face {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 5px;
            display: flex; align-items: center; justify-content: center;
        }

        .card-back {
            background: var(--card-back);
            border: 1px solid #333;
            color: #222; font-size: 2rem;
        }

        .card-front {
            background: #fff;
            transform: rotateY(180deg);
            border: 2px solid #fff;
        }
        .card-front img { width: 80%; height: 80%; object-fit: contain; }

        /* --- 彈窗 --- */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex; align-items: center; justify-content: center;
            z-index: 2000;
        }
        .modal {
            background: #111; padding: 40px; border: 1px solid var(--qin-color);
            text-align: center; max-width: 400px;
        }
        .input-field {
            width: 100%; padding: 12px; margin: 20px 0; background: #222;
            border: 1px solid #444; color: white; text-align: center;
        }
        .start-btn {
            background: var(--qin-color); color: white; border: none;
            padding: 12px 40px; cursor: pointer; font-weight: bold; font-size: 1rem;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- 初始命名 -->
    <div id="setup-screen" class="overlay">
        <div class="modal">
            <h2 style="color: var(--qin-color); letter-spacing: 5px;">暗網：記憶對決</h2>
            <p style="color: #888;">對手：秦徹</p>
            <input type="text" id="name-input" class="input-field" placeholder="輸入你的稱號" maxlength="8">
            <button class="start-btn" onclick="initGame()">接受挑戰</button>
        </div>
    </div>

    <!-- 結局 -->
    <div id="result-screen" class="overlay hidden">
        <div class="modal">
            <h2 id="res-title"></h2>
            <p id="res-desc" style="text-align: left; line-height: 1.8; color: #ccc;"></p>
            <button class="start-btn" onclick="location.reload()">再次對峙</button>
        </div>
    </div>

    <div class="main-container">
        <!-- 秦徹立繪區 -->
        <div class="qin-sidebar">
            <div class="qin-portrait-frame">
                <img id="qin-img" class="qin-image" src="https://via.placeholder.com/320x480?text=QinChe_Normal" alt="秦徹">
            </div>
            <div class="qin-dialogue-box">
                <div class="qin-name-tag">秦徹</div>
                <span id="qin-text">想拿走這件東西？那就看你記不記得住了。</span>
            </div>
        </div>

        <!-- 遊戲棋盤區 -->
        <div class="game-board-container">
            <div class="top-info">
                <div id="p1-name" class="player-tag active" style="color: var(--p1-color);">玩家</div>
                <div class="target-card">
                    <img id="target-icon" src="" style="width: 40px; height: 40px; object-fit: contain;">
                    <div style="font-size: 0.7rem; color: var(--accent); margin-top: 5px;">目標：<span id="target-name"></span></div>
                </div>
                <div class="player-tag" id="qin-name-tag" style="color: var(--qin-color);">秦徹</div>
            </div>
            <div class="grid" id="grid"></div>
        </div>
    </div>

    <script>
        /**
         * [配置區] 更換秦徹立繪與圖片
         */
        const QIN_ASSETS = {
            "normal": { img: "https://via.placeholder.com/320x480?text=QinChe_Normal", msg: "該你了。別發呆，我沒這麼多耐心。" },
            "thinking": { img: "https://via.placeholder.com/320x480?text=QinChe_Thinking", msg: "讓我想想...隱藏在暗處的牌，應該是這個位置。" },
            "match": { img: "https://via.placeholder.com/320x480?text=QinChe_Success", msg: "看來這對牌注定要留在我的場面上。" },
            "fail": { img: "https://via.placeholder.com/320x480?text=QinChe_Fail", msg: "嘖，記錯了嗎？有趣。" },
            "win": { img: "https://via.placeholder.com/320x480?text=QinChe_Win", msg: "勝負已分。東西我收下了，至於你...我有別的用處。" },
            "lose": { img: "https://via.placeholder.com/320x480?text=QinChe_Lose", msg: "竟然真的被你拿到了...這份驚喜，我收下了。" }
        };

        const CARDS_CONFIG = {
            "薛明": "https://cdn-icons-png.flaticon.com/128/4333/4333609.png", 
            "薛影": "https://cdn-icons-png.flaticon.com/128/4333/4333614.png",
            "梅":   "https://cdn-icons-png.flaticon.com/128/1047/1047461.png",
            "槍":   "https://cdn-icons-png.flaticon.com/128/5457/5457494.png",
            "寶石": "https://cdn-icons-png.flaticon.com/128/1255/1255153.png",
            "羽毛": "https://cdn-icons-png.flaticon.com/128/2913/2913501.png"
        };

        let cardList = [...Object.keys(CARDS_CONFIG), ...Object.keys(CARDS_CONFIG)];
        let target = "";
        let playerName = "探測者";
        let currentPlayer = 1; // 1: 玩家, 2: 秦徹
        let flippedStack = [];
        let isLocked = true;
        let memory = {}; // 秦徹的記憶庫

        // 更新秦徹狀態
        function setQinState(stateKey) {
            const data = QIN_ASSETS[stateKey];
            document.getElementById('qin-img').src = data.img;
            document.getElementById('qin-text').innerText = data.msg;
        }

        // 初始化遊戲
        function initGame() {
            const name = document.getElementById('name-input').value.trim();
            if(name) playerName = name;
            document.getElementById('p1-name').innerText = playerName;
            document.getElementById('setup-screen').classList.add('hidden');

            // 隨機目標
            target = Object.keys(CARDS_CONFIG)[Math.floor(Math.random() * 6)];
            document.getElementById('target-name').innerText = target;
            document.getElementById('target-icon').src = CARDS_CONFIG[target];

            // 洗牌並生成
            cardList.sort(() => Math.random() - 0.5);
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            cardList.forEach((type, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.type = type;
                card.dataset.index = i;
                card.innerHTML = `
                    <div class="card-face card-back">?</div>
                    <div class="card-face card-front"><img src="${CARDS_CONFIG[type]}"></div>
                `;
                card.addEventListener('click', () => playerFlip(card));
                grid.appendChild(card);
            });

            isLocked = false;
            setQinState("normal");
        }

        function playerFlip(card) {
            if (isLocked || currentPlayer !== 1 || card.classList.contains('flipped')) return;
            doFlip(card);
        }

        function doFlip(card) {
            card.classList.add('flipped');
            flippedStack.push(card);
            
            // 秦徹記住這張牌
            memory[card.dataset.index] = card.dataset.type;

            if (flippedStack.length === 2) {
                isLocked = true;
                setTimeout(checkMatch, 800);
            }
        }

        function checkMatch() {
            const [c1, c2] = flippedStack;
            const isSame = c1.dataset.type === c2.dataset.type;

            if (isSame) {
                // 【關鍵修改】配對成功：卡牌保持翻開狀態，停留在場面上
                if (c1.dataset.type === target) {
                    endGame(currentPlayer);
                    return;
                }
                
                if (currentPlayer === 2) setQinState("match");
                nextTurn();
            } else {
                // 配對失敗：翻回去
                if (currentPlayer === 2) setQinState("fail");
                c1.classList.remove('flipped');
                c2.classList.remove('flipped');
                nextTurn();
            }
        }

        function nextTurn() {
            flippedStack = [];
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            
            document.getElementById('p1-name').classList.toggle('active', currentPlayer === 1);
            document.getElementById('qin-name-tag').classList.toggle('active', currentPlayer === 2);

            if (currentPlayer === 2) {
                isLocked = true;
                setQinState("thinking");
                setTimeout(qinMove, 1200);
            } else {
                isLocked = false;
                setQinState("normal");
            }
        }

        function qinMove() {
            const cards = document.querySelectorAll('.card');
            const hiddenIdx = [...cards]
                .filter(c => !c.classList.contains('flipped'))
                .map(c => parseInt(c.dataset.index));

            if (hiddenIdx.length === 0) return;

            // 1. 檢查記憶中是否有目標牌對
            const targetInMem = Object.keys(memory).filter(idx => memory[idx] === target && hiddenIdx.includes(parseInt(idx)));
            
            let first, second;

            if (targetInMem.length >= 2) {
                first = targetInMem[0];
                second = targetInMem[1];
            } else {
                // 2. 隨機翻第一張
                first = hiddenIdx[Math.floor(Math.random() * hiddenIdx.length)];
                doFlip(cards[first]);

                // 翻開後，檢查記憶庫有無配對
                setTimeout(() => {
                    const type1 = cards[first].dataset.type;
                    const match = Object.keys(memory).find(idx => memory[idx] === type1 && idx != first && hiddenIdx.includes(parseInt(idx)));
                    
                    if (match) {
                        second = match;
                    } else {
                        const remain = hiddenIdx.filter(i => i != first);
                        second = remain[Math.floor(Math.random() * remain.length)];
                    }
                    doFlip(cards[second]);
                }, 700);
                return;
            }

            doFlip(cards[first]);
            setTimeout(() => doFlip(cards[second]), 700);
        }

        function endGame(winner) {
            const modal = document.getElementById('result-screen');
            const title = document.getElementById('res-title');
            const desc = document.getElementById('res-desc');
            modal.classList.remove('hidden');

            if (winner === 1) {
                setQinState("lose");
                title.innerText = "結局 A：贏得的籌碼";
                title.style.color = "var(--p1-color)";
                desc.innerText = `${playerName}，你成功的速度比我想像中快一點。\n\n秦徹鬆了鬆領帶，嘴角帶著一抹若有似無的笑意：「既然這場遊戲是你贏了，那這個『戰利品』就歸你了。當然...我也會記得這筆帳。」`;
            } else {
                setQinState("win");
                title.innerText = "結局 B：掌控之中";
                title.style.color = "var(--qin-color)";
                desc.innerText = `最後一張「${target}」被秦徹修長的手指優雅地翻開。\n\n「太慢了。」他低沉的聲音在耳邊響起，「在絕對的記憶面前，你的遲疑就是敗因。東西我就收下了，至於你...今晚就留在這裡，慢慢補償我的時間吧。」`;
            }
        }
    </script>
</body>
</html>
