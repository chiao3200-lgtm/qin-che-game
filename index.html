<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記憶對戰：與秦徹的博弈</title>
    <style>
        :root {
            --bg-color: #050507;
            --card-back: #1a1a20;
            --p1-color: #70a1ff;
            --qin-color: #ff4757;
            --accent: #eccc68;
            --text: #f1f2f6;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: "Microsoft JhengHei", sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .main-layout {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            max-width: 1000px;
            padding: 20px;
        }

        /* 左側：秦徹立繪與對話區 */
        .qin-container {
            width: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .qin-portrait-box {
            width: 300px;
            height: 450px;
            background: linear-gradient(180deg, transparent, rgba(255, 71, 87, 0.1));
            border-bottom: 3px solid var(--qin-color);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .qin-portrait {
            width: 100%;
            height: 100%;
            object-fit: contain; /* 確保圖片不變形 */
            transition: transform 0.3s, opacity 0.3s;
        }

        .qin-dialogue {
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 71, 87, 0.3);
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-size: 0.95rem;
            min-height: 50px;
            color: #ddd;
            line-height: 1.5;
            position: relative;
        }

        .qin-dialogue::before {
            content: "秦徹";
            position: absolute;
            top: -12px; left: 15px;
            background: var(--qin-color);
            color: white;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 4px;
        }

        /* 右側：遊戲網格區 */
        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .status-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .player-info {
            padding: 10px;
            border-radius: 5px;
            opacity: 0.3;
            transition: 0.3s;
        }
        .player-info.active { opacity: 1; border: 1px solid var(--text); }

        .target-box {
            background: #151518;
            padding: 10px 20px;
            border: 2px solid var(--accent);
            text-align: center;
            border-radius: 8px;
        }
        .target-icon { width: 40px; height: 40px; object-fit: contain; }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 85px);
            grid-template-rows: repeat(3, 115px);
            gap: 12px;
            perspective: 1000px;
        }

        /* 卡牌樣式 */
        .card {
            width: 100%; height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
            cursor: pointer;
        }
        .card.flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
        }
        .card-back { background: var(--card-back); border: 1px solid #333; }
        .card-front { background: white; transform: rotateY(180deg); }
        .card-front img { width: 80%; height: 80%; object-fit: contain; }

        /* 彈窗 */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1a1a1e; padding: 40px; border-radius: 12px;
            border-top: 4px solid var(--qin-color); text-align: center; max-width: 400px;
        }
        .name-input { width: 100%; padding: 10px; margin: 15px 0; background: #222; border: 1px solid #444; color: white; text-align: center; }
        .btn-main { background: var(--qin-color); color: white; border: none; padding: 10px 30px; cursor: pointer; font-weight: bold; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- 開場畫面 -->
    <div id="start-screen" class="modal">
        <div class="modal-content">
            <h2 style="color: var(--accent)">暗網博弈</h2>
            <p>秦徹發出了挑戰邀請...</p>
            <input type="text" id="user-name-input" class="name-input" placeholder="輸入你的稱呼" maxlength="8">
            <button class="btn-main" onclick="startGame()">接受挑戰</button>
        </div>
    </div>

    <!-- 結局畫面 -->
    <div id="end-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="end-title">結局</h2>
            <p id="end-desc" style="text-align: left; line-height: 1.6;"></p>
            <button class="btn-main" onclick="location.reload()">再次博弈</button>
        </div>
    </div>

    <div class="main-layout">
        <!-- 左側：秦徹 -->
        <div class="qin-container">
            <div class="qin-portrait-box">
                <!-- 秦徹立繪圖片 -->
                <img id="qin-img" class="qin-portrait" src="https://via.placeholder.com/300x450?text=QinChe_Idle" alt="秦徹">
            </div>
            <div id="qin-bubble" class="qin-dialogue">
                準備好了嗎？別讓我等太久。
            </div>
        </div>

        <!-- 右側：遊戲 -->
        <div class="game-area">
            <div class="status-bar">
                <div id="p1-badge" class="player-info p1 active">玩家</div>
                <div class="target-box">
                    <img id="target-img" class="target-icon" src="" alt="">
                    <span id="target-label" style="display: block; font-size: 0.7rem; color: var(--accent);">目標</span>
                </div>
                <div id="qin-badge" class="player-info qin" style="color: var(--qin-color);">秦徹</div>
            </div>
            <div class="grid" id="grid"></div>
        </div>
    </div>

    <script>
        /**
         * 【修改教學：秦徹圖片與對話】
         * 請在此處更換秦徹在不同狀態下的圖片網址
         */
        const qinAssets = {
            "idle": {
                "img": "https://via.placeholder.com/300x450?text=Normal", // 玩家回合
                "msg": "該你翻牌了。希望你的記憶力跟你的膽量一樣大。"
            },
            "thinking": {
                "img": "https://via.placeholder.com/300x450?text=Thinking", // 輪到秦徹
                "msg": "讓我想想...隱藏在這些牌後面的，會是什麼呢？"
            },
            "success": {
                "img": "https://via.placeholder.com/300x450?text=Success", // 秦徹配對成功
                "msg": "看來運氣（還是實力？）站在我這一邊。"
            },
            "fail": {
                "img": "https://via.placeholder.com/300x450?text=Fail", // 秦徹配對失敗
                "msg": "嘖，失誤了嗎？沒關係，這才有趣。"
            },
            "win": {
                "img": "https://via.placeholder.com/300x450?text=Win", // 秦徹獲勝
                "msg": "勝負已分。看來，你還需要更多的練習...或者直接求我。"
            },
            "lose": {
                "img": "https://via.placeholder.com/300x450?text=Lose", // 玩家獲勝
                "msg": "不錯，竟然能從我手中搶走它。這份驚喜，我收到了。"
            }
        };

        const itemConfig = {
            "薛明": "https://cdn-icons-png.flaticon.com/128/4333/4333609.png", 
            "薛影": "https://cdn-icons-png.flaticon.com/128/4333/4333614.png",
            "梅":   "https://cdn-icons-png.flaticon.com/128/1047/1047461.png",
            "槍":   "https://cdn-icons-png.flaticon.com/128/5457/5457494.png",
            "寶石": "https://cdn-icons-png.flaticon.com/128/1255/1255153.png",
            "羽毛": "https://cdn-icons-png.flaticon.com/128/2913/2913501.png"
        };

        const itemNames = Object.keys(itemConfig);
        let cardsArray = [...itemNames, ...itemNames];
        let targetItem = "";
        let currentPlayer = 1;
        let playerName = "探測者";
        let flippedCards = [];
        let isLock = true;
        let aiMemory = {};

        // 更新秦徹狀態的函式
        function updateQinState(stateKey) {
            const state = qinAssets[stateKey];
            const imgEl = document.getElementById('qin-img');
            const bubbleEl = document.getElementById('qin-bubble');
            
            imgEl.style.opacity = 0; // 淡出效果
            setTimeout(() => {
                imgEl.src = state.img;
                bubbleEl.innerText = state.msg;
                imgEl.style.opacity = 1; // 淡入
            }, 300);
        }

        function startGame() {
            const inputName = document.getElementById('user-name-input').value.trim();
            if (inputName) playerName = inputName;
            document.getElementById('p1-badge').innerText = playerName;
            document.getElementById('start-screen').classList.add('hidden');
            isLock = false;
            updateQinState("idle");
            initBoard();
        }

        function initBoard() {
            cardsArray.sort(() => Math.random() - 0.5);
            targetItem = itemNames[Math.floor(Math.random() * itemNames.length)];
            document.getElementById('target-label').innerText = targetItem;
            document.getElementById('target-img').src = itemConfig[targetItem];

            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            cardsArray.forEach((name, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.name = name;
                card.dataset.index = index;
                card.innerHTML = `
                    <div class="card-face card-back"></div>
                    <div class="card-face card-front"><img src="${itemConfig[name]}"></div>
                `;
                card.addEventListener('click', () => {
                    if (currentPlayer === 1 && !isLock && !card.classList.contains('flipped')) {
                        handleFlip(card);
                    }
                });
                grid.appendChild(card);
            });
        }

        function handleFlip(card) {
            card.classList.add('flipped');
            flippedCards.push(card);
            aiMemory[card.dataset.index] = card.dataset.name;
            if (flippedCards.length === 2) checkMatch();
        }

        function checkMatch() {
            isLock = true;
            const [c1, c2] = flippedCards;
            const isMatch = (c1.dataset.name === c2.dataset.name);

            if (isMatch) {
                if (c1.dataset.name === targetItem) {
                    setTimeout(() => showEnding(currentPlayer), 600);
                    return;
                }
                // 配對成功非目標
                if(currentPlayer === 2) updateQinState("success");
                setTimeout(switchTurn, 1000);
            } else {
                // 配對失敗
                if(currentPlayer === 2) updateQinState("fail");
                setTimeout(() => {
                    c1.classList.remove('flipped');
                    c2.classList.remove('flipped');
                    switchTurn();
                }, 1000);
            }
        }

        function switchTurn() {
            flippedCards = [];
            currentPlayer = (currentPlayer === 1) ? 2 : 1;
            isLock = (currentPlayer === 2);

            document.getElementById('p1-badge').classList.toggle('active', currentPlayer === 1);
            document.getElementById('qin-badge').classList.toggle('active', currentPlayer === 2);

            if (currentPlayer === 2) {
                updateQinState("thinking");
                setTimeout(aiMove, 1500);
            } else {
                updateQinState("idle");
            }
        }

        function aiMove() {
            const allCards = [...document.querySelectorAll('.card')];
            const availableIndexes = allCards
                .filter(c => !c.classList.contains('flipped'))
                .map(c => parseInt(c.dataset.index));

            if (availableIndexes.length === 0) return;

            const targetsInMem = Object.keys(aiMemory).filter(idx => 
                aiMemory[idx] === targetItem && availableIndexes.includes(parseInt(idx))
            );

            let p1Idx, p2Idx;
            if (targetsInMem.length >= 2) {
                p1Idx = targetsInMem[0]; p2Idx = targetsInMem[1];
            } else {
                p1Idx = availableIndexes[Math.floor(Math.random() * availableIndexes.length)];
                // 為了流暢性，先翻一張
                handleFlip(allCards[p1Idx]);
                setTimeout(() => {
                    const matchIdx = Object.keys(aiMemory).find(idx => 
                        aiMemory[idx] === allCards[p1Idx].dataset.name && idx != p1Idx && availableIndexes.includes(parseInt(idx))
                    );
                    p2Idx = matchIdx || availableIndexes.filter(i => i != p1Idx)[Math.floor(Math.random() * (availableIndexes.length - 1))];
                    handleFlip(allCards[p2Idx]);
                }, 800);
                return;
            }
            handleFlip(allCards[p1Idx]);
            setTimeout(() => handleFlip(allCards[p2Idx]), 800);
        }

        function showEnding(winner) {
            const modal = document.getElementById('end-modal');
            const title = document.getElementById('end-title');
            const desc = document.getElementById('end-desc');
            modal.classList.remove('hidden');

            if (winner === 1) {
                updateQinState("lose");
                title.innerText = "結局 A：贏得的籌碼";
                desc.innerText = `在緊張的博弈中，${playerName} 搶先翻開了「${targetItem}」。\n\n秦徹並不顯得懊惱，反而饒有興致地看著你：「不錯的記憶力，這份『獎勵』暫時歸你了。不過...博弈還長著呢。」`;
            } else {
                updateQinState("win");
                title.innerText = "結局 B：掌控之中";
                desc.innerText = `秦徹不疾不徐地翻開了兩張「${targetItem}」。\n\n「太慢了，${playerName}。」他低沉的聲音響起，「這件東西我就收下了。至於你，還需要更多的練習...或者，直接求我也可以。」`;
            }
        }
    </script>
</body>
</html>
