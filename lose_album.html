<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>回憶相簿：秦徹</title>
    <style>
        :root {
            --accent: #ff4d4d;
            --bg: #050508;
        }
        * { box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex;
            flex-direction: column;
            align-items: center; /* 讓整體頁面內容置中 */
        }

        h1 { color: var(--accent); letter-spacing: 3px; margin-bottom: 30px; font-size: 1.5rem; text-align: center; }
        
        /* --- 相簿網格：關鍵居中設定 --- */
        .gallery {
            display: grid;
            /* 使用 auto-fit 配合 justify-content: center 讓圖片不足一排時也能居中 */
            grid-template-columns: repeat(auto-fit, 140px); 
            justify-content: center; /* 核心：水平置中所有卡片 */
            gap: 20px;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* 縮圖樣式：模糊 5px + 50% 黑 */
        .gallery-item {
            width: 140px;
            aspect-ratio: 3/4;
            background: #000;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid #222;
            transition: border-color 0.3s;
        }
        .gallery-item:hover { border-color: var(--accent); }
        .gallery-item img {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: blur(5px) brightness(0.5);
            transition: 0.4s ease;
        }
        .gallery-item:hover img { filter: blur(2px) brightness(0.7); }

        /* --- 燈箱 (Lightbox) --- */
        .lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }
        .lightbox img {
            max-width: 90%; max-height: 80%;
            object-fit: contain;
            filter: none !important;
            animation: fadeIn 0.3s;
        }

        /* 導航按鈕 */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: none;
            width: 60px; height: 100px;
            font-size: 2.5rem;
            cursor: pointer;
            z-index: 3100;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-btn:hover { background: rgba(255, 77, 77, 0.4); }
        .prev-btn { left: 0; border-radius: 0 10px 10px 0; }
        .next-btn { right: 0; border-radius: 10px 0 0 10px; }

        .close-btn {
            position: absolute;
            top: 20px; right: 20px;
            background: none; border: none;
            color: white; font-size: 3rem;
            cursor: pointer; z-index: 3200;
        }

        .nav-info {
            position: absolute;
            bottom: 30px;
            color: #888;
            font-size: 1rem;
            letter-spacing: 2px;
        }

        .back-btn { 
            display: inline-block; 
            margin-top: 50px; 
            padding: 12px 40px; 
            background: var(--accent); 
            color: #fff; 
            text-decoration: none; 
            font-weight: bold; 
            letter-spacing: 2px;
            border-radius: 4px; 
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* 手機版適配 */
        @media (max-width: 600px) {
            .gallery {
                grid-template-columns: repeat(2, 1fr); /* 手機版固定兩欄並置中 */
                max-width: 320px;
            }
            .gallery-item { width: 100%; }
            .nav-btn { width: 50px; height: 80px; font-size: 2rem; background: rgba(0,0,0,0.5); }
        }
    </style>
</head>
<body>

    <h1>回憶相簿</h1>

    <div class="gallery" id="gallery-root">
        <!-- 圖片區：請更換為你的實際圖片網址 -->
        <div class="gallery-item"><img src="https://via.placeholder.com/600x900?text=Qin_1" alt="1"></div>
        <div class="gallery-item"><img src="https://via.placeholder.com/600x900?text=Qin_2" alt="2"></div>
        <div class="gallery-item"><img src="https://via.placeholder.com/600x900?text=Qin_3" alt="3"></div>
        <div class="gallery-item"><img src="https://via.placeholder.com/600x900?text=Qin_4" alt="4"></div>
        <div class="gallery-item"><img src="https://via.placeholder.com/600x900?text=Qin_5" alt="5"></div>
        <div class="gallery-item"><img src="https://via.placeholder.com/600x900?text=Qin_6" alt="6"></div>
    </div>

    <a href="index.html" class="back-btn">返回對決</a>

    <!-- 燈箱 -->
    <div id="lightbox" class="lightbox">
        <button class="close-btn" onclick="closeLB()">&times;</button>
        <button class="nav-btn prev-btn" onclick="changeImg(-1, event)">&#10094;</button>
        <img id="lb-img" src="">
        <button class="nav-btn next-btn" onclick="changeImg(1, event)">&#10095;</button>
        <div class="nav-info"><span id="cur-idx">1</span> / <span id="total-idx">1</span></div>
    </div>

    <script>
        const imgElements = document.querySelectorAll('.gallery-item img');
        const images = Array.from(imgElements).map(img => img.src);
        let curIdx = 0;

        const lb = document.getElementById('lightbox');
        const lbImg = document.getElementById('lb-img');
        const curLabel = document.getElementById('cur-idx');
        const totalLabel = document.getElementById('total-idx');

        // 初始化
        imgElements.forEach((img, idx) => {
            img.parentElement.onclick = () => {
                curIdx = idx;
                updateLB();
                lb.style.display = 'flex';
                totalLabel.innerText = images.length;
            };
        });

        function updateLB() {
            lbImg.src = images[curIdx];
            curLabel.innerText = curIdx + 1;
        }

        function closeLB() { lb.style.display = 'none'; }

        function changeImg(step, e) {
            e.stopPropagation();
            curIdx = (curIdx + step + images.length) % images.length;
            updateLB();
        }

        // 鍵盤與點擊背景關閉
        document.addEventListener('keydown', e => {
            if(lb.style.display === 'flex') {
                if(e.key === 'ArrowLeft') changeImg(-1, e);
                if(e.key === 'ArrowRight') changeImg(1, e);
                if(e.key === 'Escape') closeLB();
            }
        });

        lb.onclick = (e) => { if(e.target === lb) closeLB(); };
    </script>
</body>
</html>
